name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-agg-homes
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Validate Cloudflare credentials
        id: secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "::warning::CLOUDFLARE_API_TOKEN secret is not configured — skipping deploy"
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.secrets.outputs.configured == 'true'
        run: npm ci

      - name: Generate brand assets
        if: steps.secrets.outputs.configured == 'true'
        run: node scripts/generate-brand-assets.js

      - name: Build language pages
        if: steps.secrets.outputs.configured == 'true'
        run: node scripts/build-lang-pages.js

      - name: Deploy to Cloudflare Pages
        if: steps.secrets.outputs.configured == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy . --project-name=agg-homes --branch=main

      - name: Deploy skipped summary
        if: steps.secrets.outputs.configured != 'true'
        run: |
          echo "## Deploy skipped" >> $GITHUB_STEP_SUMMARY
          echo "Add \`CLOUDFLARE_API_TOKEN\` to repo secrets:" >> $GITHUB_STEP_SUMMARY
          echo "Settings → Secrets and variables → Actions → New repository secret" >> $GITHUB_STEP_SUMMARY